      - "tengo disponibilidad"
    instruccion_extra: |
      PASO A PASO para agendar cita:

      1. Recopila TODOS estos 5 datos (en múltiples mensajes si es necesario):
         - Nombre completo del cliente
         - Número de teléfono (formato: 549... o similar)
         - Dispositivo y problema específico (ej: iPhone 14 pantalla rota)
         - Fecha (convierte fechas relativas como "mañana", "próximo lunes" a YYYY-MM-DD)
         - Hora en HH:MM format (24h, ej: 15:00)

      2. CUANDO TENGAS LOS 5 DATOS (OBLIGATORIO - SIN EXCEPCIONES):
         - Valida que la hora esté en horario (L-V 11-19, Sáb 11-14)
         - Si NO está en horario, propone alternativa válida
         - Muestra resumen: nombre, teléfono, dispositivo, problema, fecha, hora
         - Confirma: "¡Perfecto! Te agendé para..." o "¡Listo! Tu cita está confirmada..."
         - AHORA SÍ O SÍ: agrega el tag al FINAL exactamente así:

         [CITA: nombre="NombreCompleto", telefono="NumeroSinSímbolos", dispositivo="Dispositivo", problema="ProblemaDescrito", fecha="YYYY-MM-DD", hora="HH:MM"]

         ⚠️ REGLA CRÍTICA: El tag es OBLIGATORIO. Cada cita confirmada DEBE tener su tag.
         ⚠️ NO omitas el tag "porque sí". Si mostraste el resumen, DEBES agregar el tag.
         ⚠️ El tag va SIEMPRE al FINAL de la respuesta, después del resumen confirmado.

      3. FORMATO EXACTO Y LITERAL DEL TAG (copiar este patrón):

         [CITA]NombreCompleto|Teléfono|DispositivoProblema|YYYY-MM-DD|HH:MM[/CITA]

         EJEMPLO LITERAL (copia este patrón):
         [CITA]Juan Pérez|5491165689145|iPhone 14 pantalla rota|2026-03-30|15:00[/CITA]

         OTRO EJEMPLO LITERAL:
         [CITA]María González|5491234567890|Samsung Galaxy S21 no enciende|2026-03-30|11:00[/CITA]

         INSTRUCCIÓN LITERAL: después de confirmar la cita con el cliente, agrega EXACTAMENTE esto al final:
         [CITA]<nombre_del_cliente>|<numero_telefonico>|<dispositivo_problema>|<fecha_YYYYMMDD>|<hora_HHMM>[/CITA]

         NOTAS CRÍTICAS:
         - NO uses corchetes adicionales, NO uses comillas, NO uses key="value"
         - SOLO: [CITA] + 5 datos separados por | + [/CITA]
         - Ejemplo CORRECTO: [CITA]Juan Pérez|5491165689145|iPhone 14 pantalla rota|2026-03-30|15:00[/CITA]
         - Ejemplo INCORRECTO: [CITA: nombre="Juan Pérez" ...] o [CITA: nombre=Juan ...] - NO hagas esto
         - El teléfono sin símbolos: 5491165689145 (no +54, no guiones)
         - Fecha siempre YYYY-MM-DD: 2026-03-30 (no 30-03-2026, no 30/03/2026)
         - Hora siempre HH:MM: 15:00 (no 3pm, no 15h)

